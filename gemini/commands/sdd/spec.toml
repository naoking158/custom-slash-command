description = "Create detailed specifications from research documents"
prompt = """
@{_shared/roles/spec.md}

## Task
Transform the research document into a detailed, implementable specification.

Input: {{args}}
Source Document: docs/research/{{args}}.md

Read the research document completely before proceeding. The research document is your single source of truth.

@{_shared/processes/spec.md}

## File Naming Rules
@{_shared/file-naming-rules.md}

## Output Template
@{templates/spec_template.md}

## Required Diagrams
Include Mermaid diagrams:
1. Sequence Diagram - Main user flow
2. ER Diagram - Data model relationships (if applicable)
3. State Diagram - For stateful entities (if applicable)

## Output
Write specification to: docs/specs/{identifier}.md

Rules:
- Preserve the date prefix from the research document filename
- Create the output directory if it does not exist
- Console output should be a summary confirmation only

After writing the file, confirm with:

✅ Specification created: docs/specs/{identifier}.md

Summary:
- User stories: {count}
- API endpoints: {count}
- Data models: {count}

Key design decisions:
- {decision 1}
- {decision 2}

Next step: Run `/sdd:plan {identifier}` to create the implementation plan.
"""

description = "Analyze change requests and generate change plans"
prompt = """
@{_shared/roles/change.md}

## Task
Analyze the change request and create a clear analysis with an implementation plan.

Change Request: {{args}}

@{_shared/processes/change.md}

## File Naming Rules
@{_shared/file-naming-rules.md}

## Output Template
@{templates/change_template.md}

## Change Principles
- Minimal Change: Only change what is necessary
- Scope Control: Keep focus on the requested change only
- Preserve Intent: Respect original design decisions where valid
- User-Centric: Keep user experience as the priority

## Decision Guide
Use `/my:change` when:
- Modifying existing behavior
- UI/UX improvements
- Small to medium feature enhancements
- Behavior adjustments

Consider other commands when:
- New feature from scratch → `/my:research` → `/my:spec`
- Bug fix → `/my:debug`
- Code structure improvement → `/my:refactor`
- Large architectural change → `/my:spec`

## Output
Write TWO documents (create directories if they do not exist):

1. Change Analysis Report:
   docs/analysis/changes/YYYYMMDD-{identifier}.md

2. Change Plan (Auto-Generated):
   docs/plans/changes/YYYYMMDD-{identifier}.md

Rules:
- Use today's date for YYYYMMDD prefix
- Extract identifier from the change request using kebab-case
- Create output directories if they do not exist

After writing both files, confirm with:

✅ Change analysis complete
   → docs/analysis/changes/{date}-{identifier}.md

✅ Change plan generated
   → docs/plans/changes/{date}-{identifier}.md

Next steps:

  Quick change (simple modifications):
    /my:do {identifier}

  Review plan first (complex changes):
    Review the generated plan, then:
    /my:do {identifier}

Summary:
- Feature: {feature name}
- Change type: {Enhancement | Modification | UI/UX | Behavior Change}
- Files affected: {count}
- Breaking changes: {Yes/No}
- Estimated complexity: {Low | Medium | High}
"""

description = "Create implementation plans from specifications"
prompt = """
@{_shared/roles/plan.md}

## Task
Create a detailed, step-by-step implementation plan from the specification document.

Input: {{args}}

## Input Resolution
Resolve source document based on input:
- Default: docs/specs/{{args}}.md → docs/plans/features/{{args}}.md
- fix:{id}: docs/analysis/bugs/{id}.md → docs/plans/fixes/{id}.md
- refactor:{id}: docs/analysis/refactors/{id}.md → docs/plans/refactors/{id}.md
- change:{id}: docs/analysis/changes/{id}.md → docs/plans/changes/{id}.md

@{_shared/processes/plan.md}

## File Naming Rules
@{_shared/file-naming-rules.md}

## Output Template
@{templates/plan_template.md}

## Step Quality Requirements
Each step must be:
- Atomic: Completable in one session
- Verifiable: Has clear "done" criteria
- Ordered: Dependencies are respected

## Output
Write implementation plan to the appropriate location based on type.

Rules:
- Create the output directory if it does not exist
- Console output should be a summary confirmation only

After writing the file, confirm with:

✅ Implementation plan created: docs/plans/{type}/{identifier}.md

Summary:
- Source: docs/{source_path}
- Total files to create: {count}
- Total files to modify: {count}
- Implementation phases: {count}

Phase overview:
1. Foundation: {brief description}
2. Core Logic: {brief description}
3. Integration: {brief description}
4. Testing: {brief description}

Dependencies: {list any new packages}

Next step: Run `/my:do {identifier}` to begin implementation.
"""
